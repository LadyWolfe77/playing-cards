<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playing Cards</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main id="playing-cards">
    <div class="card">
      <div class="left">♠</div>
      <div class="middle">A</div>
      <div class="right">
        ♠</div></div>
    </div>
    <div class="card">
      <div class="left">♣</div>
      <div class="middle">2</div>
      <div class="right">♣</div>
    </div>
    <div class="card">
      <div class="left"><div class="red">♥</div></div>
      <div class="middle"><div class="red">3</div></div>
      <div class="right"><div class="red">♥</div></div>
    </div>
    <div class="card">
      <div class="left"><div class="red">♦</div></div>
      <div class="middle"><div class="red">4</div></div>
      <div class="right"><div class="red">♦</div></div>
    </div>
  </main>
</body>

</html>
